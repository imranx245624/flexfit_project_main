    <script>
      (function () {
        try {
          var url = new URL(window.location.href);
          var redirect = url.searchParams.get("redirect");
          if (redirect) {
            var target = decodeURIComponent(redirect);
            if (target && target.charAt(0) === "/") {
              window.history.replaceState(null, "", target);
            }
          }
        } catch (e) {}
      })();
    </script>
